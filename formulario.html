<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS — Formulário</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --magenta: #c8005a;
    --bg: #f2efea;
    --ink: #1a1714;
    --ink2: #4a4642;
    --rule: #d4cfc9;
    --font-d: 'Bebas Neue', sans-serif;
    --font-s: 'DM Sans', sans-serif;
  }
  body {
    background: var(--bg);
    font-family: var(--font-s);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    background: rgba(242,239,234,.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .tb-brand {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none;
  }
  .tb-logo {
    height: 52px; width: auto;
  }
  .tb-sub {
    font-size: 9px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink2);
    border-left: 1px solid var(--rule);
    padding-left: 14px;
  }
  .tb-back {
    font-size: 9px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: var(--ink2); text-decoration: none;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border: 1px solid var(--rule);
    border-radius: 3px; transition: all .15s;
  }
  .tb-back:hover { border-color: var(--magenta); color: var(--magenta); }

  /* HERO */
  .hero {
    background: var(--magenta);
    padding: 32px 24px 28px;
    text-align: center;
  }
  .hero-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: .28em; text-transform: uppercase;
    color: rgba(255,255,255,.6);
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: var(--font-d);
    font-size: clamp(26px, 6vw, 40px);
    letter-spacing: .04em; color: #fff;
    line-height: 1;
  }

  /* FORM WRAP */
  .form-wrap {
    flex: 1;
    padding: 32px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .form-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);
    width: 100%;
    max-width: 660px;
    overflow: hidden;
  }

  .form-card {
    overflow: hidden;
  }
  .iframe-clip {
    overflow: hidden;
    /* altura da janela visível — ajuste se necessário */
    height: 720px;
    position: relative;
  }
  .form-card iframe {
    width: 100%;
    height: 1100px;
    border: none;
    display: block;
    /* empurra para cima para esconder o header do Google Forms (~60px) */
    margin-top: -62px;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--rule);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ft-brand {
    font-family: var(--font-d);
    font-size: 16px; letter-spacing: .06em; color: var(--ink);
  }
  .ft-brand span {
    display: block;
    font-family: var(--font-s);
    font-size: 8px; font-weight: 300;
    letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink2); margin-top: 2px;
  }
  .ft-info {
    font-size: 9px; font-weight: 300;
    color: var(--ink2); letter-spacing: .1em;
    text-align: right;
  }

  @media(max-width: 520px) {
    .tb-sub { display: none; }
    .hero { padding: 24px 16px 20px; }
    footer { flex-direction: column; align-items: flex-start; }
    .ft-info { text-align: left; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="tb-brand" href="index.html">
    <img class="tb-logo"
         src="https://exposicao-mis.github.io/mis-copa/images/mis-logo.png"
         alt="MIS">
    <span class="tb-sub">Arquitetura em Cena</span>
  </a>
  <a class="tb-back" href="index.html">&#8249; Voltar</a>
</div>

<div class="hero">
  <div class="hero-label">Arquitetura em Cena · MIS Copa</div>
  <div class="hero-title">Formulário</div>
</div>

<div class="form-wrap">
  <div class="form-card">
    <div class="iframe-clip">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLScjGcxYj_JJTVshsz6pcZsWGbSk9VyvlYCJ6C3HKi2-bdVvSA/viewform?embedded=true"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="Formulário MIS">Carregando…</iframe>
    </div>
  </div>
</div>

<footer>
  <div class="ft-brand">MIS<span>Museu da Imagem e do Som</span></div>
  <div class="ft-info">Arquitetura em Cena<br>Rio de Janeiro · 2026</div>
</footer>

</body>
</html>
